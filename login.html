<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 游戏合集</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box}
        body {
            background:#111;
            background-image: url("bg.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: multiply;
            background-color: rgba(0,0,0,0.65);
            color:#fff;
            text-align:center;
            min-height: 100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .login-box {
            width: 360px;
            background: #222;
            border: 2px solid #4cd964;
            border-radius: 10px;
            padding: 35px 25px;
        }
        .login-box h2 {
            color: #4cd964;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .login-item {
            margin-bottom: 20px;
            text-align: left;
        }
        .login-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .login-item input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            font-size: 16px;
            background: #111;
            border: 1px solid #4cd964;
            border-radius: 4px;
            color: #fff;
            outline: none;
        }
        .login-item input:focus {
            box-shadow: 0 0 8px #4cd96477;
        }
        #loginBtn {
            width: 100%;
            height: 46px;
            margin-top: 10px;
            background: #4cd964;
            color: #111;
            border: none;
            border-radius: 4px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        #loginBtn:hover {
            background: #3bc053;
        }
        .tip-text {
            color: #ff7777;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>游戏合集登录</h2>
        <div class="login-item">
            <label>昵称</label>
            <input type="text" id="nickname" placeholder="请输入昵称">
        </div>
        <div class="login-item">
            <label>电子邮箱</label>
            <input type="email" id="email" placeholder="请输入邮箱">
        </div>
        <div class="login-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="请输入密码">
        </div>
        <div class="tip-text" id="tip">请填写完整昵称、邮箱和密码！</div>
        <button id="loginBtn">登录进入游戏合集</button>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const nickname = document.getElementById('nickname');
        const email = document.getElementById('email');
        const pwd = document.getElementById('pwd');
        const tip = document.getElementById('tip');

        // 已经登录过直接跳主页
        if(localStorage.getItem('gameUser')){
            location.href = "index.html";
        }

        loginBtn.addEventListener('click', ()=>{
            const nameVal = nickname.value.trim();
            const emailVal = email.value.trim();
            const pwdVal = pwd.value.trim();
            tip.style.display = 'none';

            // 空值校验
            if(!nameVal || !emailVal || !pwdVal) {
                tip.style.display = 'block';
                return;
            }
            // 本地存储登录信息
            localStorage.setItem('gameUser', JSON.stringify({
                nick: nameVal,
                email: emailVal,
                pass: pwdVal
            }));
            // 登录成功跳转主页
            location.href = "index.html";
        })
    </script>
</body>
</html>
