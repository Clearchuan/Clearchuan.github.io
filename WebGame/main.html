<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页小游戏 · 合集</title>
  <style>
    /* ===== 基础重置 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== 首页样式 ===== */
    .top-banner {
      width: 100%;
      background: #3a3f4b;
      color: white;
      padding: 1.2rem 0;
      text-align: center;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .game-grid {
      width: 100%;
      max-width: 1000px;
      padding: 2rem 1.5rem;
      background: white;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.8rem;
      margin: 0 auto;
    }

    .game-card {
      aspect-ratio: 1 / 1;
      background: #eaeef3;
      border-radius: 24px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
      cursor: pointer;
    }

    .game-card:hover {
      transform: scale(1.01);
    }

    .game-card .card-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 500;
      color: #1e2a3a;
      background: #eaeef3;
      padding: 0.5rem;
      text-align: center;
      line-height: 1.3;
      text-decoration: none;
    }

    .game-card .card-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(60, 68, 80, 0.65);
      backdrop-filter: blur(1px);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      border-radius: 24px;
      pointer-events: none;
    }

    .game-card:hover .card-overlay {
      transform: translateX(0);
      pointer-events: auto;
    }

    .play-btn {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(2px);
      padding: 0.7rem 2rem;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #1f2a3a;
      border: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.15s;
      letter-spacing: 1px;
      pointer-events: auto;
    }

    .play-btn:hover {
      background: white;
      transform: scale(1.04);
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .footer-about {
      width: 100%;
      max-width: 1000px;
      padding: 1.5rem 1.5rem 2.5rem;
      background: white;
      display: flex;
      justify-content: center;
    }

    .about-btn {
      background: #eaeef3;
      border: none;
      padding: 0.8rem 3rem;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 500;
      color: #1f2a3a;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 1px;
    }

    .about-btn:hover {
      background: #d5dce6;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.06);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 640px) {
      .game-grid { gap: 1rem; padding: 1rem; }
      .game-card .card-content { font-size: 1.1rem; }
      .top-banner { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <!-- ========== 首页 ========== -->
  <div style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div class="top-banner">🎮 网页小游戏</div>
    <div class="game-grid">
      <a class="game-card" href="2048.html">
        <div class="card-content">2048</div>
        <div class="card-overlay"><span class="play-btn">▶ 开始游戏</span></div>
      </a>
      <a class="game-card" href="puzzle.html">
        <div class="card-content">数字华容道</div>
        <div class="card-overlay"><span class="play-btn">▶ 开始游戏</span></div>
      </a>
      <a class="game-card" href="wordchain.html">
        <div class="card-content">英文单词接龙</div>
        <div class="card-overlay"><span class="play-btn">▶ 开始游戏</span></div>
      </a>
      <a class="game-card" href="guessword.html">
        <div class="card-content">猜英文单词</div>
        <div class="card-overlay"><span class="play-btn">▶ 开始游戏</span></div>
      </a>
      <a class="game-card" href="snake.html">
        <div class="card-content">贪吃蛇</div>
        <div class="card-overlay"><span class="play-btn">▶ 开始游戏</span></div>
      </a>
      <a class="game-card" href="memory.html">
        <div class="card-content">记忆翻牌</div>
        <div class="card-overlay"><span class="play-btn">▶ 开始游戏</span></div>
      </a>
    </div>
    <div class="footer-about">
      <button class="about-btn" id="aboutBtn">👥 组员介绍</button>
    </div>
  </div>

  <script>
    document.getElementById('aboutBtn').addEventListener('click', function() {
      alert('👥 组员介绍（共八人）\n组长：张三 (整体架构)\n组员：李四 (2048)\n组员：王五 (华容道)\n组员：赵六 (单词接龙)\n组员：孙七 (猜单词)\n组员：周八 (贪吃蛇)\n组员：吴九 (记忆翻牌)\n组员：郑十 (UI/测试)');
    });
  </script>
</body>
</html>
