<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贪吃蛇</title>
<style>
*{margin:0;padding:0;background:#000}
body{display:flex;flex-direction:column;align-items:center;margin-top:30px}
#score{color:#fff;font-size:26px;margin-bottom:12px}
canvas{border:3px solid #333}
.back{margin-top:20px;padding:10px 24px;background:#0f0;color:#000;text-decoration:none;font-size:18px;border-radius:4px}
</style>
</head>
<body>
<div id="score">得分：0</div>
<canvas id="game" width="400" height="400"></canvas>
<a class="back" href="index.html">返回游戏主页</a>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("score");
const size = 20;
let speed = 8;
let score = 0;
let snake = [{x:10,y:10}];
let dx = 1, dy = 0;
let food = {};

function createFood(){
    return {
        x:Math.floor(Math.random()*canvas.width/size),
        y:Math.floor(Math.random()*canvas.height/size)
    }
}
food = createFood();

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowUp"&&dy!==1){dx=0;dy=-1}
    if(e.key==="ArrowDown"&&dy!==-1){dx=0;dy=1}
    if(e.key==="ArrowLeft"&&dx!==1){dx=-1;dy=0}
    if(e.key==="ArrowRight"&&dx===0){dx=1;dy=0}
})

function loop(){
    let head = {x:snake[0].x+dx,y:snake[0].y+dy};
    if(head.x<0) head.x = canvas.width/size -1;
    if(head.x>=canvas.width/size) head.x=0;
    if(head.y<0) head.y=canvas.height/size -1;
    if(head.y>=canvas.height/size) head.y=0;

    for(let seg of snake){
        if(seg.x===head.x&&seg.y===head.y){
            alert("游戏结束，得分："+score);
            snake = [{x:10,y:10}];
            dx=1;dy=0;score=0;speed=8;
            food=createFood();
            scoreText.textContent="得分：0";
            return;
        }
    }
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){
        score += 10;
        scoreText.textContent="得分："+score;
        food=createFood();
        if(speed<16)speed+=0.3;
    }else{
        snake.pop();
    }
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#f33";
    ctx.fillRect(food.x*size,food.y*size,size-2,size-2);
    ctx.fillStyle="#0f0";
    snake.forEach(item=>ctx.fillRect(item.x*size,item.y*size,size-2,size-2));
}
function runGame(){
    loop();
    setTimeout(runGame,1000/speed);
}
runGame();
</script>
</body>
</html>
