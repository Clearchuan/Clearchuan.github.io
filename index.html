<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏合集主页</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box}
        body {
            background:#111;
            background-image: url("bg.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: multiply;
            background-color: rgba(0,0,0,0.65);
            color:#fff;
            text-align:center;
            padding-top:80px;
            min-height: 100vh;
        }
        h1 {font-size:42px; margin-bottom:50px; color:#4cd964}
        .game-box {display:flex; gap:25px; justify-content:center; flex-wrap:wrap; max-width:900px; margin:0 auto}
        /* 游戏卡片容器 */
        .game-card {
            width:180px;
            border:2px solid #4cd964;
            border-radius:8px;
            overflow:hidden;
            transition:0.2s;
            background:#222;
        }
        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #4cd96477;
        }
        /* 封面图片铺满卡片 */
        .game-card img {
            width:100%;
            height:140px;
            object-fit: cover;
            display:block;
        }
        /* 底部文字标题 */
        .game-name {
            display:block;
            padding:12px 0;
            color:#4cd964;
            text-decoration:none;
            font-size:20px;
        }
        .game-card:hover .game-name {
            background:#4cd964;
            color:#111;
        }
    </style>
</head>
<body>
    <h1>休闲小游戏合集</h1>
    <div class="game-box">
        <!-- 贪吃蛇图片入口 -->
        <div class="game-card">
            <a href="snake.html">
                <img src="snake-preview.png" alt="贪吃蛇">
            </a>
            <a class="game-name" href="snake.html">贪吃蛇</a>
        </div>
        <!-- 坦克大战图片入口 -->
        <div class="game-card">
            <a href="tank.html">
                <img src="tank-preview.png" alt="坦克大战">
            </a>
            <a class="game-name" href="tank.html">坦克大战</a>
        </div>
        <!-- 像素飞机图片入口 -->
        <div class="game-card">
            <a href="plane.html">
                <img src="plane-preview.png" alt="像素飞机">
            </a>
            <a class="game-name" href="plane.html">像素飞机</a>
        </div>
        <!-- 新增：赛尔号肉鸽游戏 -->
        <div class="game-card">
            <a href="https://4khx59uaxrunk.aiforce.cloud/app/app_179kg15crwg" target="_blank">
                <img src="seer-preview.png" alt="赛尔号肉鸽游戏">
            </a>
            <a class="game-name" href="https://4khx59uaxrunk.aiforce.cloud/app/app_179kg15crwg" target="_blank">赛尔号肉鸽游戏</a>
        </div>
    </div>
</body>
</html>
