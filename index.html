<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏合集主页</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box}
        body {
            background:#111;
            background-image: url("bg.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: multiply;
            background-color: rgba(0,0,0,0.65);
            color:#fff;
            text-align:center;
            padding-top:80px;
            min-height: 100vh;
        }
        h1 {font-size:42px; margin-bottom:10px; color:#4cd964}
        .online-info {font-size:18px; margin-bottom:40px;}
        #msgBox {
            width: 700px;
            height: 120px;
            border: 1px solid #4cd964;
            margin: 0 auto 40px;
            padding:10px;
            text-align:left;
            overflow:auto;
        }
        .game-box {display:flex; gap:25px; justify-content:center; flex-wrap:wrap; max-width:900px; margin:0 auto}
        /* 游戏卡片容器 */
        .game-card {
            width:180px;
            border:2px solid #4cd964;
            border-radius:8px;
            overflow:hidden;
            transition:0.2s;
            background:#222;
        }
        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px #4cd96477;
        }
        /* 封面图片铺满卡片 */
        .game-card img {
            width:100%;
            height:140px;
            object-fit: cover;
            display:block;
        }
        /* 底部文字标题 */
        .game-name {
            display:block;
            padding:12px 0;
            color:#4cd964;
            text-decoration:none;
            font-size:20px;
        }
        .game-card:hover .game-name {
            background:#4cd964;
            color:#111;
        }
        /* 新增退出按钮样式 */
        .logout-btn{
            position:fixed;
            top:20px;
            right:30px;
            padding:8px 16px;
            background:#4cd964;
            color:#111;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <!-- 退出登录按钮 -->
    <button class="logout-btn" id="logout">退出登录</button>

    <h1>欢迎 <span id="userNick"></span> | 休闲小游戏合集</h1>
    <div class="online-info">联机大厅在线人数：<span id="onlineNum">0</span></div>
    <div id="msgBox"></div>

    <div class="game-box">
        <!-- 贪吃蛇 -->
        <div class="game-card">
            <a href="snake.html">
                <img src="snake-preview.png" alt="贪吃蛇">
            </a>
            <a class="game-name" href="snake.html">贪吃蛇</a>
        </div>
        <!-- 坦克大战 -->
        <div class="game-card">
            <a href="tank.html">
                <img src="tank-preview.png" alt="坦克大战">
            </a>
            <a class="game-name" href="tank.html">坦克大战</a>
        </div>
        <!-- 像素飞机 -->
        <div class="game-card">
            <a href="plane.html">
                <img src="plane-preview.png" alt="像素飞机">
            </a>
            <a class="game-name" href="plane.html">像素飞机</a>
        </div>
        <!-- 赛尔号肉鸽游戏 -->
        <div class="game-card">
            <a href="https://4khx59uaxrunk.aiforce.cloud/app/app_179kg15crwg" target="_blank">
                <img src="seer-preview.png" alt="赛尔号肉鸽游戏">
            </a>
            <a class="game-name" href="https://4khx59uaxrunk.aiforce.cloud/app/app_179kg15crwg" target="_blank">赛尔号肉鸽游戏</a>
        </div>
        <!-- 俄罗斯方块 -->
        <div class="game-card">
            <a href="tetris.html">
                <img src="tetris-preview.png" alt="俄罗斯方块">
            </a>
            <a class="game-name" href="tetris.html">俄罗斯方块</a>
        </div>
        <!-- 2D赛车 -->
        <div class="game-card">
            <a href="Racing.html">
                <img src="racing-preview.png" alt="2D赛车">
            </a>
            <a class="game-name" href="Racing.html">2D赛车</a>
        </div>
        <!-- 井字棋 -->
        <div class="game-card">
            <a href="tictactoe.html">
                <img src="tictactoe-preview.png" alt="井字棋">
            </a>
            <a class="game-name" href="tictactoe.html">井字棋</a>
        </div>
        <!-- 打砖块 -->
        <div class="game-card">
            <a href="breakout.html">
                <img src="breakout-preview.png" alt="打砖块">
            </a>
            <a class="game-name" href="breakout.html">打砖块</a>
        </div>
        <!-- 2048 -->
        <div class="game-card">
            <a href="2048.html">
                <img src="2048-preview.png" alt="2048">
            </a>
            <a class="game-name" href="2048.html">2048</a>
        </div>
        <!-- 猜单词 -->
        <div class="game-card">
            <a href="guessword.html">
                <img src="guessword-preview.png" alt="猜单词">
            </a>
            <a class="game-name" href="guessword.html">猜单词</a>
        </div>
        <!-- 拼图 -->
        <div class="game-card">
            <a href="puzzle.html">
                <img src="puzzle-preview.png" alt="拼图">
            </a>
            <a class="game-name" href="puzzle.html">拼图</a>
        </div>
        <!-- 词语接龙 -->
        <div class="game-card">
            <a href="wordchain.html">
                <img src="wordchain-preview.png" alt="词语接龙">
            </a>
            <a class="game-name" href="wordchain.html">词语接龙</a>
        </div>
        <!-- 记忆翻牌 -->
        <div class="game-card">
            <a href="memory.html">
                <img src="memory-preview.png" alt="记忆翻牌">
            </a>
            <a class="game-name" href="memory.html">记忆翻牌</a>
        </div>
        <!-- 塔防 -->
        <div class="game-card">
            <a href="tower.html">
                <img src="tower-preview.png" alt="塔防">
            </a>
            <a class="game-name" href="tower.html">塔防</a>
        </div>
        <!-- 末日生存 -->
        <div class="game-card">
            <a href="survival/">
                <img src="survival/末日生存.png" alt="末日生存">
            </a>
            <a class="game-name" href="survival/">末日生存</a>
        </div>
        <!-- 五子棋 -->
        <div class="game-card">
            <a href="gomoku.html">
                <img src="gomoku-preview.png" alt="五子棋">
            </a>
            <a class="game-name" href="gomoku.html">五子棋</a>
        </div>
    </div>

    <script>
        // ========== 替换成你的服务器公网IP ==========
        const SERVER_IP = "42.192.106.162";
        const API_URL = `http://${SERVER_IP}:3000`;
        const WS_URL = `ws://${SERVER_IP}:3000`;

        let ws = null;
        const token = localStorage.getItem('token');
        const msgBox = document.getElementById('msgBox');
        const onlineNumEl = document.getElementById('onlineNum');
        const userNickEl = document.getElementById('userNick');

        // 页面加载校验登录状态
        window.onload = async function(){
            if(!token){
                location.href = "login.html";
                return;
            }
            try{
                const res = await fetch(`${API_URL}/api/auth`, {
                    headers: { token }
                });
                const data = await res.json();
                if(data.code !== 200){
                    localStorage.removeItem('token');
                    localStorage.removeItem('userInfo');
                    location.href = "login.html";
                    return;
                }
                // 展示用户名
                userNickEl.innerText = data.user.nick;
                // 连接联机WebSocket
                connectWs();
            }catch(err){
                location.href = "login.html";
            }
        }

        // 连接联机大厅
        function connectWs(){
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                addLog("✅ 成功进入联机大厅");
                ws.send(JSON.stringify({
                    type: "join",
                    token: token
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                switch(data.type){
                    case "playerJoin":
                        addLog(`🎮 玩家【${data.nick}】上线，当前在线：${data.onlineCount}人`);
                        onlineNumEl.innerText = data.onlineCount;
                        break;
                    case "playerLeave":
                        addLog(`👋 玩家【${data.nick}】下线，当前在线：${data.onlineCount}人`);
                        onlineNumEl.innerText = data.onlineCount;
                        break;
                    case "error":
                        addLog(`❌ 错误：${data.msg}`);
                        break;
                }
            };

            ws.onclose = () => {
                addLog("❌ 服务器断开，3秒后自动重连");
                setTimeout(connectWs, 3000);
            };
        }

        // 打印大厅日志
        function addLog(text){
            msgBox.innerHTML += text + "<br>";
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        // 退出登录
        document.getElementById('logout').addEventListener('click',()=>{
            if(ws) ws.close();
            localStorage.removeItem('token');
            localStorage.removeItem('userInfo');
            location.href = "login.html";
        })
    </script>
</body>
</html>
