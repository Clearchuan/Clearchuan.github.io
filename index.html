<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏合集主页</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box}
        body {
            background:#111;
            background-image: url("bg.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: multiply;
            background-color: rgba(0,0,0,0.65);
            color:#fff;
            text-align:center;
            padding-top:80px;
            min-height: 100vh;
        }
        h1 {font-size:42px; margin-bottom:50px; color:#4cd964}
        .game-box {display:flex; gap:25px; justify-content:center; flex-wrap:wrap; max-width:900px; margin:0 auto}
        /* 游戏卡片容器 */
        .game-card {
            width:180px;
            border:2px solid #4cd964;
            border-radius:8px;
            overflow:hidden;
            transition:0.2s;
            background:#222;
        }
        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px #4cd96477;
        }
        /* 封面图片铺满卡片 */
        .game-card img {
            width:100%;
            height:140px;
            object-fit: cover;
            display:block;
        }
        /* 底部文字标题 */
        .game-name {
            display:block;
            padding:12px 0;
            color:#4cd964;
            text-decoration:none;
            font-size:20px;
        }
        .game-card:hover .game-name {
            background:#4cd964;
            color:#111;
        }
        /* 新增退出按钮样式 */
        .logout-btn{
            position:fixed;
            top:20px;
            right:30px;
            padding:8px 16px;
            background:#4cd964;
            color:#111;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <!-- 退出登录按钮 -->
    <button class="logout-btn" id="logout">退出登录</button>

    <h1>休闲小游戏合集</h1>
    <div class="game-box">
        <!-- 贪吃蛇图片入口 -->
        <div class="game-card">
            <a href="snake.html">
                <img src="snake-preview.png" alt="贪吃蛇">
            </a>
            <a class="game-name" href="snake.html">贪吃蛇</a>
        </div>
        <!-- 坦克大战图片入口 -->
        <div class="game-card">
            <a href="tank.html">
                <img src="tank-preview.png" alt="坦克大战">
            </a>
            <a class="game-name" href="tank.html">坦克大战</a>
        </div>
        <!-- 像素飞机图片入口 -->
        <div class="game-card">
            <a href="plane.html">
                <img src="plane-preview.png" alt="像素飞机">
            </a>
            <a class="game-name" href="plane.html">像素飞机</a>
        </div>
        <!-- 赛尔号肉鸽游戏 -->
        <div class="game-card">
            <a href="https://4khx59uaxrunk.aiforce.cloud/app/app_179kg15crwg" target="_blank">
                <img src="seer-preview.png" alt="赛尔号肉鸽游戏">
            </a>
            <a class="game-name" href="https://4khx59uaxrunk.aiforce.cloud/app/app_179kg15crwg" target="_blank">赛尔号肉鸽游戏</a>
        </div>
        <!-- 俄罗斯方块 -->
        <div class="game-card">
            <a href="tetris.html">
                <img src="tetris-preview.png" alt="俄罗斯方块">
            </a>
            <a class="game-name" href="tetris.html">俄罗斯方块</a>
        </div>
        <!-- 2D赛车 -->
        <div class="game-card">
            <a href="Racing.html">
                <img src="racing-preview.png" alt="2D赛车">
            </a>
            <a class="game-name" href="Racing.html">2D赛车</a>
        </div>
        <!-- 井字棋 -->
        <div class="game-card">
            <a href="tictactoe.html">
                <img src="tictactoe-preview.png" alt="井字棋">
            </a>
            <a class="game-name" href="tictactoe.html">井字棋</a>
        </div>
        <!-- 打砖块 -->
        <div class="game-card">
            <a href="breakout.html">
                <img src="breakout-preview.png" alt="打砖块">
            </a>
            <a class="game-name" href="breakout.html">打砖块</a>
        </div>
        <!-- 2048 -->
        <div class="game-card">
            <a href="2048.html">
                <img src="2048-preview.png" alt="2048">
            </a>
            <a class="game-name" href="2048.html">2048</a>
        </div>
        <!-- 猜单词 -->
        <div class="game-card">
            <a href="guessword.html">
                <img src="guessword-preview.png" alt="猜单词">
            </a>
            <a class="game-name" href="guessword.html">猜单词</a>
        </div>
        <!-- 拼图 -->
        <div class="game-card">
            <a href="puzzle.html">
                <img src="puzzle-preview.png" alt="拼图">
            </a>
            <a class="game-name" href="puzzle.html">拼图</a>
        </div>
        <!-- 词语接龙 -->
        <div class="game-card">
            <a href="wordchain.html">
                <img src="wordchain-preview.png" alt="词语接龙">
            </a>
            <a class="game-name" href="wordchain.html">词语接龙</a>
        </div>
        <!-- 记忆翻牌 -->
        <div class="game-card">
            <a href="memory.html">
                <img src="memory-preview.png" alt="记忆翻牌">
            </a>
            <a class="game-name" href="memory.html">记忆翻牌</a>
        </div>
        <!-- 新增塔防 tower.html -->
        <div class="game-card">
            <a href="tower.html">
                <img src="tower-preview.png" alt="塔防">
            </a>
            <a class="game-name" href="tower.html">塔防</a>
        </div>
    </div>

    <script>
        // 判断是否登录，未登录自动跳转登录页
        if(!localStorage.getItem('gameUser')){
            location.href = "login.html";
        }
        // 退出登录功能
        document.getElementById('logout').addEventListener('click',()=>{
            localStorage.removeItem('gameUser');
            location.href = "login.html";
        })
    </script>
</body>
</html>
