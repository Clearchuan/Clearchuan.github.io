<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D RACING - 多人联机对战版</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #1a252f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; overflow: hidden; user-select: none;
        }
        #gameWrapper { position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        canvas { background-color: #7f8c8d; display: block; }
        #scoreBoard {
            position: absolute; top: 15px; left: 15px; font-size: 22px; font-weight: bold;
            color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10;
        }
        #networkStatus { position: absolute; bottom: 10px; left: 15px; font-size: 14px; color: #e74c3c; z-index: 10; }
        #roomUI { margin-top: 15px; display: flex; gap: 10px; }
        #roomInput { padding: 8px; font-size: 16px; border: none; border-radius: 4px; width: 120px; text-align: center; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(26, 37, 47, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }
        .overlay h1 { font-size: 48px; margin: 0 0 5px 0; color: #3498db; text-shadow: 0 0 10px rgba(52, 152, 219, 0.5); letter-spacing: 2px; }
        .overlay p { color: #bdc3c7; margin-bottom: 20px; }
        .diff-btn {
            width: 200px; margin: 8px 0; padding: 12px; font-size: 18px; font-weight: bold;
            color: white; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .diff-btn:hover { transform: scale(1.05); }
        .btn-join { background-color: #2ecc71; }
        .btn-wait { background-color: #95a5a6; cursor: not-allowed; }
        #gameOverScreen { display: none; }
    </style>
</head>
<body>

<div id="gameWrapper">
    <div id="scoreBoard">SCORE: <span id="score">0</span></div>
    <div id="networkStatus">📡 正在初始化网络模块...</div>
    
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    
    <div id="startScreen" class="overlay">
        <h1>NEO RACING</h1>
        <p>输入相同房间号即可联机双人对战</p>
        <div id="roomUI">
            <input type="text" id="roomInput" value="101" placeholder="房间号">
            <button class="diff-btn btn-join" style="width:100px; margin:0; padding:8px;" onclick="joinRoom()">加入</button>
        </div>
        <div id="waitPrompt" style="margin-top:25px; color:#f1c40f; display:none; font-size:18px; font-weight:bold;">
            已进入房间，等待对手切入...
        </div>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1 style="color: #e74c3c;">MATCH OVER</h1>
        <div style="font-size:24px; margin-bottom:30px;">你的得分: <span id="finalScore" style="color:#f1c40f; font-size:32px; font-weight:bold;">0</span></div>
        <button class="diff-btn btn-join" onclick="location.reload()">重新匹配</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreElement = document.getElementById('finalScore');
    const networkStatusElement = document.getElementById('networkStatus');

    // ==========================================
    // 【联机网络核心同步引擎】
    // ==========================================
    const SERVER_URL = 'https://game-server-279669-6-1409195771.sh.run.tcloudbase.com'; 
    const socket = io(SERVER_URL);
    
    let myId = null;        
    let myRole = 'guest';      // 角色：host(房主)负责发车，guest(客人)负责接收
    let gameRoom = null;    
    let opponent = null;    

    socket.on('connect', () => {
        networkStatusElement.innerText = '🟢 已接入腾讯云游戏集群';
        networkStatusElement.style.color = '#2ecc71';
        myId = socket.id;
    });

    socket.on('disconnect', () => {
        networkStatusElement.innerText = '🔴 联机网络断开';
        networkStatusElement.style.color = '#e74c3c';
    });

    // 核心：处理加入房间后的身份分配
    function joinRoom() {
        const roomVal = document.getElementById('roomInput').value.trim();
        if(!roomVal) return;
        gameRoom = 'room_' + roomVal;
        document.getElementById('roomUI').style.display = 'none';
        document.getElementById('waitPrompt').style.display = 'block';
        
        // 向云端申请挂载房间
        socket.emit('joinRoom', { room: gameRoom, id: myId });
    }

    socket.on('initRole', (data) => {
        myRole = data.role;
        console.log('获得房间控制权限:', myRole);
    });

    // 核心：人齐了，云端下发开赛指令
    socket.on('gameStart', (data) => {
        document.getElementById('startScreen').style.display = 'none';
        isPlaying = true;
        resetData();
        update();
    });

    // 核心：高频捕获云端镜像数据
    socket.on('syncAction', (data) => {
        if (data.room === gameRoom) {
            if (data.type === 'pos') {
                if (!opponent) opponent = { x: 0, y: 0, angle: 0 };
                opponent.x = data.x;
                opponent.y = data.y;
                opponent.angle = data.angle;
            }
            if (data.type === 'spawnObj' && myRole === 'guest') {
                // 客人严禁自己计算障碍物，完全依据房主发送的云端镜像生成
                obstacles.push({
                    lane: data.lane,
                    x: roadOffsetX + data.lane * laneWidth + laneWidth / 2,
                    y: data.y,
                    speed: data.speed,
                    color: '#e74c3c'
                });
            }
        }
    });

    // 广播自己的即时车位
    function uploadMyPosition() {
        if (socket.connected && isPlaying) {
            socket.emit('syncAction', {
                type: 'pos', room: gameRoom, id: myId,
                x: player.x, y: player.y, angle: player.angle
            });
        }
    }

    // ==========================================
    // 【物理与渲染逻辑】
    // ==========================================
    let score = 0; let gameLoop; let isPlaying = false;
    let speedMultiplier = 1; let baseSpeed = 2.5; let currentScrollSpeed = 0; 
    const roadOffsetX = 120; const laneWidth = 120;
    
    const player = { lane: 1, x: roadOffsetX + 1 * laneWidth + laneWidth / 2, y: canvas.height - 110, width: 50, height: 90, color: '#3498db', angle: 0 };
    let obstacles = []; let lines = [0, 150, 300, 450, 600]; let keyProcessed = false;

    function tryMoveLeft() {
        if (player.lane > 0) { player.lane--; uploadMyPosition(); return true; }
        return false;
    }
    function tryMoveRight() {
        if (player.lane < 2) { player.lane++; uploadMyPosition(); return true; }
        return false;
    }

    window.addEventListener('keydown', (e) => {
        if (!isPlaying || keyProcessed) return;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { tryMoveLeft(); keyProcessed = true; } 
        else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { tryMoveRight(); keyProcessed = true; }
    });
    window.addEventListener('keyup', (e) => { if (['ArrowLeft','a','A','ArrowRight','d','D'].includes(e.key)) keyProcessed = false; });

    function drawCar(x, y, color, angle = 0, isP2 = false) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
        const w = player.width, h = player.height, rx = -w / 2, ry = -h / 2;
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(rx - 4, ry + 15, 8, 20); ctx.fillRect(rx + w - 4, ry + 15, 8, 20); 
        ctx.fillRect(rx - 4, ry + h - 35, 8, 20); ctx.fillRect(rx + w - 4, ry + h - 35, 8, 20); 
        ctx.fillStyle = color; ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(rx, ry, w, h, 8); else ctx.rect(rx, ry, w, h); ctx.fill();
        ctx.fillStyle = '#ecf0f1'; ctx.fillRect(rx + 6, ry + 25, w - 12, 18);
        if(isP2) { ctx.fillStyle = '#e67e22'; ctx.font = 'bold 12px Arial'; ctx.fillText('P2', -8, -20); }
        ctx.restore();
    }

    // 核心联机逻辑：只有房主有权规划障碍物，生成后立马上传
    function spawnObstacle() {
        if (obstacles.length >= 2 || mainScrollSpeed() < 0.5) return;
        if (obstacles.length > 0 && obstacles[obstacles.length - 1].y < 300) return;

        if (Math.random() < 0.015) {
            let obsLane = Math.floor(Math.random() * 3);
            let obsData = { lane: obsLane, x: roadOffsetX + obsLane * laneWidth + laneWidth / 2, y: -120, speed: baseSpeed * speedMultiplier, color: '#e74c3c' };
            obstacles.push(obsLane, obsLane);
            
            // 房主专属：同步给客人
            socket.emit('syncAction', { type: 'spawn', room: gameRoom, id: myId, obstacle: obsLane });
        }
    }

    // 接收房主发来的刷怪指令
    socket.on('playerAction', (data) => {
        if (data.id !== myId && data.room === gameRoom) {
            if (data.type === 'start') {
                console.log('有对手准备加入战斗...');
            }
            if (data.type === 'spawn' && myId !== data.id) {
                let obsLane = data.lane;
                obstacles.push({ lane: obsLane, x: roadOffsetX + obsLane * laneWidth + laneWidth / 2, y: -120, speed: baseSpeed * speedMultiplier, color: '#e74c3c' });
            }
        }
    });

    function drawAndMoveObstacles() {
        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            obs.y += currentScrollSpeed;
            drawCar(obs.x, obs.y, obs.color, 0, 'default');
            
            // 本地独立碰撞体积判定
            if (Math.abs(player.x - obs.x) < 34 && Math.abs(player.y - obs.y) < 74) { gameOver(); return; }
            if (obs.y > canvas.height + 100) { obstacles.splice(i, 1); score += 10; scoreElement.innerText = score; i--; }
        }
    }

    function drawAndMoveLines() {
        ctx.fillStyle = '#556270'; ctx.fillRect(roadOffsetX, 0, laneWidth * 3, canvas.height);
        ctx.fillStyle = '#ecf0f1'; ctx.fillRect(roadOffsetX, 0, 5, canvas.height); ctx.fillRect(canvas.width - roadOffsetX - 5, 0, 5, canvas.height);
        ctx.fillStyle = '#bdc3c7';
        for(let i=0; i<lines.length; i++) {
            lines[i] += currentScrollSpeed; if(lines[i] > canvas.height) lines[i] = -150;
            ctx.fillRect(roadOffsetX + laneWidth - 3, lines[i], 6, 80); ctx.fillRect(roadOffsetX + laneWidth * 2 - 3, lines[i], 6, 80);
        }
    }

    function mainScrollSpeed() { return baseSpeed * speedMultiplier; }

    function update() {
        if (!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let targetSpeed = mainScrollSpeed();
        let targetX = roadOffsetX + player.lane * laneWidth + laneWidth / 2;
        let targetAngle = (targetX - player.x) * 0.015;

        player.angle = Math.max(-0.4, Math.min(0.4, targetAngle));
        currentScrollSpeed += (targetSpeed - currentScrollSpeed) * 0.05;
        player.x += (targetX - player.x) * 0.15;

        uploadMyPosition(); // 位移发生后，执行网络上报
        drawAndMoveLines();

        if (myRole === 'host') {
            // 仅允许房主执行时空运算
            if (obstacles.length >= 1 || obstacles.length > 0 && obstacles[obstacles.length - 1].y < 350) {
                if (Math.random() < 0.012) {
                    let obsLane = Math.floor(Math.random() * 3);
                    obstacles.push({ lane: obsLane, x: roadOffsetX + obsLane * laneWidth + laneWidth / 2, y: -120, speed: targetSpeed, color: '#e74c3c' });
                    socket.emit('syncAction', { type: 'spawn', room: gameRoom, id: myId, lane: obsLane });
                }
            }
        }

        drawAndMoveObstacles();
        drawCar(player.x, player.y, player.color, player.angle);
        if (opponent) { drawCar(opponent.x, opponent.y, '#e67e22', opponent.angle, true); }

        gameLoop = requestAnimationFrame(update);
    }

    function gameOver() { isPlaying = false; cancelAnimationFrame(gameLoop); finalScoreElement.innerText = score; gameOverScreen.style.display = 'flex'; }
    function resetData() { score = 0; speedMultiplier = 1; currentScrollSpeed = 0; scoreElement.innerText = score; obstacles = []; player.lane = 1; player.x = roadOffsetX + 1 * laneWidth + laneWidth / 2; player.angle = 0; lines = [0, 150, 300, 450, 600]; }
    
    ctx.fillStyle = '#7f8c8d'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#556270'; ctx.fillRect(roadOffsetX, 0, laneWidth * 3, canvas.height);
</script>

</body>
</html>
